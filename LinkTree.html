<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="LinkTree.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous" />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  </head>
  <body>
    <div class="text-center p-3">
      <span class="text-bg-dark p-2 rounded-3"
        ><i class="fa-solid fa-link me-2"></i>Link Tree App</span
      >
    </div>
    <div class="d-flex justify-content-start mb-4 ps-3">
      <div class="dropdown-center">
        <button
          class="btn btn-dark dropdown-toggle"
          type="button"
          id="linkActionsDropdown"
          data-bs-toggle="dropdown"
          aria-expanded="false">
          <i class="fa-solid fa-bars me-1"></i> İşlemler
        </button>
        <ul
          class="dropdown-menu ms-2 rounded-3 mt-1"
          aria-labelledby="linkActionsDropdown">
          <li>
            <button id="btnOpenModal" class="dropdown-item">
              <i class="fa-solid fa-plus me-1"></i>
              Link Oluştur
            </button>
          </li>
          <li>
            <button id="btnclearalllinks" class="dropdown-item">
              <i class="fa-solid fa-trash-can me-1"></i>
              Tüm linkleri temizle
            </button>
          </li>
          <li>
            <button id="btnfileexport" class="dropdown-item">
              <i class="fa-solid fa-file-arrow-up me-1"></i>
              İçe aktar (Json)
            </button>
          </li>
          <li>
            <button id="btnfilexportout" class="dropdown-item">
              <i class="fa-solid fa-cloud-arrow-up me-1"></i>
              Dışa aktar (Json)
            </button>
          </li>
          <li>
            <button id="btnmodecontrol" class="dropdown-item"></button>
          </li>
        </ul>
      </div>
      <input id="fileInput" type="file" hidden accept="application/json" />
    </div>
    <div class="d-flex justify-content-center align-items-center">
      <div class="input-group w-25">
        <span class="input-group-text"><i class="fas fa-search"></i></span>
        <input
          type="search"
          class="form-control text-center"
          id="filternamesearch"
          placeholder="Link adına göre filtrele (Enter)" />
      </div>
    </div>
    <div class="container pt-3">
      <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8" id="linkListContainer"></div>
      </div>
    </div>
    <div class="modal fade" id="qrModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" id="qrcodemodal">
          <div class="modal-header">
            <h5 class="modal-title">
              <i class="fa-solid fa-qrcode me-1"></i>QR Code
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body d-flex justify-content-center p-5">
            <div id="qrModalBody"></div>
          </div>

          <div class="modal-footer d-flex justify-content-center">
            <button
              type="button"
              class="btn btn-primary"
              data-bs-toggle="tooltip"
              data-bs-custom-class="custom-tooltip"
              data-bs-title="Ctrl + D"
              data-bs-placement="top"
              id="btnqrcode">
              <i class="fa-solid fa-download me-1"></i> İndir
            </button>
            <button
              type="button"
              class="btn btn-primary"
              data-bs-toggle="tooltip"
              data-bs-custom-class="custom-tooltip"
              data-bs-title="Ctrl + C"
              data-bs-placement="top"
              id="btncopyqrcode">
              <i class="fa-solid fa-copy me-1"></i> Qr Kopyala
            </button>
            <button
              type="button"
              class="btn btn-primary"
              data-bs-toggle="tooltip"
              data-bs-custom-class="custom-tooltip"
              data-bs-title="Ctrl + G"
              data-bs-placement="top"
              id="btnqrurlgo">
              <i class="fa-solid fa-link me-1"></i> Url Git
            </button>
            <button
              type="button"
              class="btn btn-primary"
              data-bs-toggle="tooltip"
              data-bs-custom-class="custom-tooltip"
              data-bs-title="Ctrl + Q"
              data-bs-placement="top"
              id="btnurlcopy">
              <i class="fa-solid fa-copy me-1"></i>Url Kopyala
            </button>
          </div>
        </div>
      </div>
    </div>
    <div
      class="modal fade"
      id="linkAddModal"
      tabindex="-1"
      data-bs-keyboard="false">
      <div class="modal-dialog modal-dialog-centered modal-fullscreen">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">
              <i class="fa-solid fa-circle-plus me-1"></i>Link Ekle
            </h5>
            <button id="btnCloseModal" type="button" class="btn-close"></button>
          </div>
          <div class="modal-body p-4">
            <div class="mb-2">
              <label class="form-label text-bg-dark p-2 rounded-2"
                ><i class="fa-solid fa-a me-1"></i>Link Adı</label
              >
              <input
                maxlength="50"
                type="text"
                id="LinkName"
                class="form-control"
                placeholder="Örn: YouTube (En fazla 50 karakter)" />
            </div>
            <div class="mb-3">
              <label class="form-label text-bg-dark p-2 rounded-2"
                ><i class="fa-solid fa-globe me-1"></i> URL</label
              >
              <input
                type="url"
                id="LinkUrl"
                class="form-control"
                placeholder="https://" />
            </div>
          </div>
          <div class="modal-footer d-flex justify-content-center">
            <button
              type="button"
              data-bs-toggle="tooltip"
              data-bs-custom-class="custom-tooltip"
              data-bs-title="Ctrl + Alt + K || Enter"
              data-bs-placement="top"
              class="btn btn-primary"
              id="btnSave">
              <i class="fa-solid fa-floppy-disk me-1"></i> Kaydet
            </button>
            <button
              type="button"
              data-bs-toggle="tooltip"
              data-bs-custom-class="custom-tooltip"
              data-bs-title="Ctrl + Alt + D"
              data-bs-placement="top"
              class="btn btn-danger"
              id="btnDelete">
              <i class="fa-solid fa-trash-can me-1"></i> Temizle
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="position-fixed bottom-0 end-0 p-4">
      <span class="text-bg-dark rounded-5" id="topscrool"
        ><i class="fa-solid fa-arrow-up fs-6"></i
      ></span>
    </div>
    <script src="LinkTree.js"></script>
  </body>
</html>
